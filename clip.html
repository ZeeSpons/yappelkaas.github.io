<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip Insturen - Yappelkaas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="media/favicon.png" type="image/png" />
  <meta property="og:title" content="Yappelkaas Clipjes 🎥">
  <meta property="og:description" content="Bekijk absurde, zeldzame en soms geniale fragmenten uit het kaasuniversum.">
  <meta property="og:image" content="https://yappelkaas.nl/media/og.png">
  <meta property="og:url" content="https://yappelkaas.nl/clip.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Canonical URL (zorg dat zoekmachines de juiste pagina kiezen) -->
  <link rel="canonical" href="https://yappelkaas.nl/clip">
</head>
  
<body class="clip-page">

  <div class="event-buttons">
    <a href="index" class="event-button">🏠 Home</a>
  </div>

  <header class="hero">
    <h1>Clip Insturen</h1>
    <p>
      Stuur jouw favoriete clip van Appelkaas in en misschien komt hij wel op de
      <a href="random-clip" style="color: #a29bfe; font-weight: bold;">Random clips pagina</a>!
    </p>
  </header>

  <main>
    <section class="form-container">
      <form class="clip-form" onsubmit="return handleSubmit();">
        <h2>Cliplink</h2>
        <p class="form-subtext">Plak hier de Twitch clip URL:</p>
        <input
          type="url"
          name="url"
          id="clipUrl"
          placeholder="https://www.twitch.tv/appelkaas/clip/..."
          required
        />
        <input type="hidden" name="apiKey" value="yappelkaas2025supergeheim" />
        <button type="submit" class="submit-btn">Insturen 🚀</button>
        <div class="message" id="message"></div>
      </form>
    </section>
  </main>

  <footer>
    <p>🍏🧀 Yappelkaas 2025 – Geen garantie op mentale stabiliteit.</p>
    <a href="terms-of-service.html">Algemene Voorwaarden</a> |
    <a href="privacy-policy.html">Privacyverklaring</a>
    <p class="copyright">Gemaakt door: Zeespons.</p>
  </footer>

  <script>
  async function handleSubmit() {
    const urlInput = document.getElementById("clipUrl");
    const messageDiv = document.getElementById("message");
    const url = urlInput.value.trim();

    if (!url.startsWith("https://www.twitch.tv/appelkaas/clip/")) {
      messageDiv.style.color = "#ff7675";
      messageDiv.textContent = "❌ Ongeldige link. Alleen clips van Appelkaas zijn toegestaan!";
      return false;
    }

    messageDiv.style.color = "#6c5ce7";
    messageDiv.textContent = "⏳ Clip wordt ingestuurd...";

    const formData = new FormData();
    formData.append("url", url);
    formData.append("apiKey", "yappelkaas2025supergeheim");

    try {
      const response = await fetch("https://script.google.com/macros/s/AKfycbyBdYtFR0u7k6AaZlOgeEnHNrM8tzgOahU_vHfIJUdwrSpiyko5ZMI9l1trDENR5BN3AQ/exec", {
        method: "POST",
        body: formData,
      });

      const text = await response.text();

      if (text.includes("✅")) {
        messageDiv.style.color = "green";
        messageDiv.textContent = text;
        urlInput.value = "";
      } else {
        messageDiv.style.color = "#ff7675";
        messageDiv.textContent = text;
      }
    } catch (err) {
      messageDiv.style.color = "#ff7675";
      messageDiv.textContent = "⚠️ Fout bij verzenden: " + err.message;
    }

    return false;
  }
</script>
</body>
</html>
