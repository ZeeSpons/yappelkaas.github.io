<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Random Appelkaas Clip</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="media/favicon.png" type="image/png" />
  
  <!-- Open Graph / Social Media Meta Tags -->
  <meta property="og:title" content="RANDOM CLIP">
  <meta property="og:description" content="Bekijk hier appelkaas clipjes.">
  <meta property="og:image" content="https://yappelkaas.nl/media/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://yappelkaas.nl/random-clip">
  <meta property="og:type" content="website">

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RANDOM CLIP">
  <meta name="twitter:description" content="Bekijk hier appelkaas clipjes.">
  <meta name="twitter:image" content="https://yappelkaas.nl/media/og.png">

  <!-- Canonical URL (zorg dat zoekmachines de juiste pagina kiezen) -->
  <link rel="canonical" href="https://yappelkaas.nl/random-clip">
</head>
<body class="clip-page">

  <div class="event-buttons">
    <a href="index" class="event-button">🏠 Home</a>
  </div>

  <header class="hero">
    <h1>Random Appelkaas Clip</h1>
    <p>Geniet van de chaos uit de stream!</p>
  </header>
  
  <main class="clip-main">
    <div id="clip-container" class="video-container-mystery">
      <!-- Twitch clip iframe komt hier via JS -->
    </div>

    <button id="newClipBtn" class="menu-btn">🎲 Nieuw clipje</button>
    <div id="error-msg"></div>

    <section class="uitleg-box" style="text-align: center; margin-top: 2rem;">
      <p>Heb jij zelf een legendarisch moment gevangen?</p>
      <a href="clip" class="submit-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 0.8rem 2rem;">Stuur jouw clip hier in! 🎬</a>
    </section>
  </main>

  <footer>
    <p>🍏🧀 Yappelkaas 2025 – Schizofreen als een peen.</p>
    <a href="terms-of-service.html">Algemene Voorwaarden</a> |
    <a href="privacy-policy.html">Privacyverklaring</a>
    <p class="copyright">Gemaakt door: Zeespons.</p>
  </footer>

  <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRrugVtjs-wxRUtGm96uiwByYhZIndY5pRbShTy0Towzva-sqQDTpKLo-UHcIr5qTk_Rks-e4_GtuPt/pub?output=csv';
    const clipContainer = document.getElementById("clip-container");
    const newClipBtn = document.getElementById("newClipBtn");
    const errorMsg = document.getElementById("error-msg");
    let clipIDs = [];

    async function loadClipsFromCSV() {
      try {
        const response = await fetch(csvUrl);
        if (!response.ok) throw new Error('CSV laden mislukt');
        const text = await response.text();
        clipIDs = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        if (clipIDs.length === 0) throw new Error('Geen clips gevonden');
        errorMsg.textContent = '';
        loadRandomClip();
      } catch (err) {
        errorMsg.textContent = '⚠️ Kan clips niet laden: ' + err.message;
        clipContainer.innerHTML = '<p>Geen clips beschikbaar.</p>';
        newClipBtn.disabled = true;
      }
    }

    function loadRandomClip() {
      if (clipIDs.length === 0) return;
      const randomIndex = Math.floor(Math.random() * clipIDs.length);
      const clipID = clipIDs[randomIndex];
      clipContainer.innerHTML = `<iframe src="https://clips.twitch.tv/embed?clip=${clipID}&parent=${window.location.hostname}" allowfullscreen="true" scrolling="no" frameborder="0"></iframe>`;
    }

    newClipBtn.addEventListener("click", loadRandomClip);
    loadClipsFromCSV();
  </script>
</body>
</html>
