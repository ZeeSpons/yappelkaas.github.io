<body class="game-page">

  <div class="event-buttons">
    <a href="index" class="event-button">🏠 Home</a>

  <header class="hero">
    <h1>🧀 Kaasklikker</h1>
    <p>Klik op de kaas en laat het yappen beginnen!</p>

  <main class="kaasklikker-container">

    <div class="score-board">
      <h2>Score: <span id="score">0</span></h2>
      <h3>🏆 Highscore: <span id="highscore">0</span></h3>

    <!-- De Kaas -->
    <img src="assets/kaas.webp" alt="Klik op de kaas!" id="cheese" />
    
    <audio id="click-sound" src="assets/click.mp3" preload="auto"></audio>
  </main>

  <footer>
    <p>🧀 Klik ze! Of klik weg. Jij bepaalt.</p>
    <a href="terms-of-service.html">Algemene Voorwaarden</a> |
