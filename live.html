<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stream - Appelkaas</title>
  <link rel="icon" href="media/favicon.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <meta property="og:title" content="Yappelkaas Live 📡">
<meta property="og:description" content="Volg live avonturen, streams en melige momenten rechtstreeks vanuit het kaasuniversum.">
<meta property="og:image" content="https://yappelkaas.nl/media/og.png">
<meta property="og:url" content="https://yappelkaas.nl/live.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

  <!-- Canonical URL (zorg dat zoekmachines de juiste pagina kiezen) -->
<link rel="canonical" href="https://yappelkaas.nl/live">

      .stream-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 3rem;
    }

    iframe {
      border-radius: 12px;
    }

  </style>
</head>
<body>
  <header>
    <img src="assets/logos/twitch.webp" alt="Twitch">
    <h1>Live stream van Appelkaas</h1>
  </header>

  <div class="button-bar">
    <a href="index" class="btn">🏠 Terug naar Home</a>
    <a href="https://www.twitch.tv/appelkaas" target="_blank" class="btn">
      <img src="assets/logos/twitch.webp" alt="Twitch"> Open op Twitch
    </a>
  </div>

  <div class="stream-container">
    <iframe 
  src="https://player.twitch.tv/?channel=appelkaas&parent=www.yappelkaas.nl" 
  frameborder="0" 
  allowfullscreen="true" 
  scrolling="no" 
  height="506" 
  width="900">
  </iframe>

    
    <iframe
  id="chat_embed"
  src="https://www.twitch.tv/embed/appelkaas/chat?parent=www.yappelkaas.nl"
  height="506"
  width="400">
</iframe>
  </div>


  <footer>
    <p>🍏🧀 Yappelkaas 2025 – Live, luid, legendarisch.</p>
    <a href="terms-of-service.html">Algemene Voorwaarden</a> |
  <a href="privacy-policy.html">Privacyverklaring</a>
  </footer>
</body>
</html>
