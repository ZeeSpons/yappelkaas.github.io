<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mystery - Yappelkaas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="media/favicon.png" type="image/png" />
 
  <!-- Open Graph / Social Media Meta Tags -->
  <meta property="og:title" content="Mystery.">
  <meta property="og:description" content="Wat zou hier staan?.">
  <meta property="og:image" content="https://yappelkaas.nl/media/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://yappelkaas.nl/mystery">
  <meta property="og:type" content="website">

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mystery.">
  <meta name="twitter:description" content="Wat zou hier staan?.">
  <meta name="twitter:image" content="https://yappelkaas.nl/media/og.png">

  <!-- Canonical URL (zorg dat zoekmachines de juiste pagina kiezen) -->
  <link rel="canonical" href="https://yappelkaas.nl/mystery">
</head>
<body class="mystery-page">

  <div class="event-buttons">
    <a href="index" class="event-button">🏠 Home</a>
  </div>

  <header class="hero">
    <h1>🔮 Mystery Knop 🔮</h1>
  </header>
  
  <main class="mystery-content">

    <div class="video-container-mystery" id="spinky">
        <video width="640" height="360" controls>
          <source src="assets/spinky.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
    </div>
    <p class="mystery-shout">SPINKY!</p>
    
    <div class="mystery-image-wrap">
      <img src="assets/tekening.webp" alt="Mystery afbeelding" class="mystery-gif" />
      <p class="mystery-text">Het mooie kunstwerk van appelkaas</p>
    </div>
    
    <div class="video-container-mystery" id="klinktalsweekend">
      <iframe
        id="ytframe"
        src="https://www.youtube.com/embed/uSOJbMCJBTE?autoplay=1&loop=1&playlist=uSOJbMCJBTE&si=9OLrytRPp80HLBiY"
        title="YouTube video player"
        allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
      </iframe>
    </div>
    <p class="mystery-shout">KLINKT ALS WEEKEND 🗣️🗣️🗣️</p>

  </main>

  <footer>
    <p>🍏🧀 Yappelkaas 2025 – Altijd een verrassing.</p>
    <a href="terms-of-service.html">Algemene Voorwaarden</a> |
    <a href="privacy-policy.html">Privacyverklaring</a>
    <p class="copyright">Gemaakt door: Zeespons.</p>
  </footer>

  <script>
    function isMobile() {
      return /iPhone|iPad|iPod|Android|webOS/i.test(navigator.userAgent);
    }

    if (isMobile()) {
      const videoContainer = document.getElementById('klinktalsweekend');
      const src = "https://www.youtube.com/embed/uSOJbMCJBTE?autoplay=1&loop=1&playlist=uSOJbMCJBTE&si=9OLrytRPp80HLBiY";

      function replaceIframe() {
        const iframe = document.createElement("iframe");
        iframe.src = src;
        iframe.allow = "autoplay; accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
        iframe.allowFullscreen = true;
        iframe.title = "YouTube video player";
        iframe.referrerPolicy = "strict-origin-when-cross-origin";
        iframe.style.width = "100%";
        iframe.style.height = "100%";
        iframe.style.border = "none";
        videoContainer.innerHTML = "";
        videoContainer.appendChild(iframe);
      }

      document.body.addEventListener("click", replaceIframe, { once: true });
      document.body.addEventListener("touchstart", replaceIframe, { once: true });
    }
  </script>
</body>
</html>
